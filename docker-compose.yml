volumes:
  postgres_data:
    driver: local

services:
  postgres:
    image: postgres:15-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-credit_scoring_postgres}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-credit_scoring}
      TZ: UTC
    ports:
      - "${POSTGRES_PORT:-5435}:${POSTGRES_PORT:-5435}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: -p ${POSTGRES_PORT:-5435}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -p ${POSTGRES_PORT:-5435}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scoring_network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ${API_CONTAINER_NAME:-credit_scoring_api}
    ports:
      - "${API_PORT:-8005}:${API_PORT:-8005}"
    environment:
      - GIT_PYTHON_REFRESH=quiet
      - API_PORT=${API_PORT:-8005}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_PORT:-5435}/${POSTGRES_DB:-credit_scoring}
      - ENVIRONMENT_NAME=${ENVIRONMENT_NAME:-DEV LOCAL}
      - ENVIRONMENT_COLOR=${ENVIRONMENT_COLOR:-#FF0000}
    working_dir: /app
    command: uvicorn src.api:app --host 0.0.0.0 --port ${API_PORT:-8005} --reload
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - scoring_network

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: ${STREAMLIT_CONTAINER_NAME:-credit_scoring_streamlit}
    ports:
      - "${STREAMLIT_PORT:-8505}:${STREAMLIT_PORT:-8505}"
    environment:
      - GIT_PYTHON_REFRESH=quiet
      - STREAMLIT_PORT=${STREAMLIT_PORT:-8505}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:${POSTGRES_PORT:-5435}/${POSTGRES_DB:-credit_scoring}
      - ENVIRONMENT_NAME=${ENVIRONMENT_NAME:-DEV LOCAL}
      - ENVIRONMENT_COLOR=${ENVIRONMENT_COLOR:-#FF0000}
      - API_HOST=${API_HOST:-api}
      - API_PORT=${API_PORT:-8005}
      - API_URL=${API_URL:-}
    volumes:
      - .:/app
    command: streamlit run dashboard_streamlit.py --server.port=${STREAMLIT_PORT:-8505} --server.address=0.0.0.0
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - scoring_network

networks:
  scoring_network:
    driver: bridge
