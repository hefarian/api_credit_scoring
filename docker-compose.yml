services:
  jupyter:
    build: .
    container_name: credit_scoring_jupyter
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-credit2024}
      - GIT_PYTHON_REFRESH=quiet
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --ServerApp.token=${JUPYTER_TOKEN:-credit2024}
      --ServerApp.password=''
    working_dir: /app
    stdin_open: true
    tty: true

  mlflow:
    build: .
    container_name: credit_scoring_mlflow
    ports:
      - "5000:5000"
    environment:
      - GIT_PYTHON_REFRESH=quiet
    volumes:
      - ./mlruns:/app/mlruns
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri file:/app/mlruns
    profiles:
      - mlflow
