name: Test Self-Hosted Runner

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:  # Manual trigger

jobs:
  test:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Show environment
        run: |
          echo "Runner: $env:COMPUTERNAME"
          echo "OS: Windows"
          echo "Working directory: $PWD"
          dir
      
      - name: Test Docker
        run: docker ps
        continue-on-error: true
      
      - name: Test Git
        run: git --version
      
      - name: Test Python
        run: python --version
        continue-on-error: true
      
      - name: Success Message
        run: echo "✅ Runner is working!"
