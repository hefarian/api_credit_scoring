name: CD Remote

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      target:
        description: Environment to deploy
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: cd-remote-${{ github.event.workflow_run.head_branch || inputs.target }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    services:
      ssh-server:
        image: linuxserver/openssh-server:latest
        options: >-
          --health-cmd="sshpass -p test ssh -o StrictHostKeyChecking=no localhost echo ok"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          PUID: 1000
          PGID: 1000
          TZ: UTC
          PUBLIC_KEY_FILE: /tmp/ssh/authorized_keys
          USER_NAME: deploy
          PASSWORD_SET: yes
          PASSWORD: test
        ports:
          - 2222:2222
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Resolve target environment
        id: target
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.workflow_run.head_branch }}" == "main" ]]; then
            echo "value=prod" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to remote server via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || 'localhost' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'deploy' }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          DEPLOY_PASSWORD: test
          TARGET_ENV: ${{ steps.target.outputs.value }}
        run: |
          # Si pas de secrets configurés, utiliser le serveur SSH de test local
          if [[ -z "$DEPLOY_HOST" ]] || [[ "$DEPLOY_HOST" == "localhost" ]]; then
            echo "📌 Utilisation du serveur SSH de test local sur localhost:2222"
            # Installer sshpass pour utiliser password auth si pas de clé privée
            sudo apt-get update && sudo apt-get install -y sshpass expect 2>/dev/null || true
            
            # Permet les connexions SSH sans vérifier la clé
            mkdir -p ~/.ssh
            echo "Host *" > ~/.ssh/config
            echo "  StrictHostKeyChecking no" >> ~/.ssh/config
            echo "  UserKnownHostsFile=/dev/null" >> ~/.ssh/config
            chmod 600 ~/.ssh/config
            
            # Se connecter avec password pour le test local
            sshpass -p "$DEPLOY_PASSWORD" ssh -p 2222 "$DEPLOY_USER@$DEPLOY_HOST" << 'EOF'
              echo "✅ Connexion SSH réussie au serveur de test"
              mkdir -p ~/api_credit_scoring
              cd ~/api_credit_scoring
              echo "📁 Répertoire de déploiement prêt"
            EOF
          else
            echo "🔐 Utilisation du serveur distant avec clé privée"
            # Déployer sur serveur distant avec clé SSH
            mkdir -p ~/.ssh
            echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
            
            ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" << 'EOF'
              cd ~/api_credit_scoring
              git pull origin
              docker compose down
              docker compose up -d --build
              docker compose ps
            EOF
            
            rm ~/.ssh/deploy_key
          fi

      - name: Notify deployment status
        if: success()
        run: echo "✅ Deployment to ${{ steps.target.outputs.value }} completed successfully"

      - name: Notify deployment failure
        if: failure()
        run: echo "❌ Deployment failed for ${{ steps.target.outputs.value }}"