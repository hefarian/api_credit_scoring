# ==========================================
# GitHub Actions Workflow - DEV Server Deploy
# Deploy to DEV server simulation (P08)
# Ports: API 8001, Streamlit 8501, DB 5433
# ==========================================

name: 🔵 Deploy DEV Server

on:
  push:
    branches:
      - dev
    paths-ignore:
      - '**.md'
      - 'Documentation/**'
  workflow_dispatch:

env:
  P08_DIR: g:\GITHUB\Data-Scientist-OC\P08

jobs:
  deploy-dev-server:
    name: Deploy DEV Server (8001/8501/5433)
    runs-on: [self-hosted, windows]
    
    steps:
      - name: Deployment info
        shell: powershell
        run: |
          Write-Host "DEV Server Deployment" -ForegroundColor Blue
          Write-Host "  Branch: ${{ github.ref_name }}" -ForegroundColor Cyan
          Write-Host "  Commit: ${{ github.sha }}" -ForegroundColor Cyan
          Write-Host "  By: ${{ github.actor }}" -ForegroundColor Cyan
      
      - name: Pull latest code in DEV clone
        shell: powershell
        run: |
          cd "${{ env.P08_DIR }}\api_credit_scoring_dev"
          Write-Host "Pulling latest dev code into clone..." -ForegroundColor Yellow
          git reset --hard
          git pull origin dev
      
      - name: Stop DEV server containers
        shell: powershell
        run: |
          cd "${{ env.P08_DIR }}"
          Write-Host "Stopping DEV server containers..." -ForegroundColor Yellow
          docker-compose -f docker-compose.dev.yml --env-file .env.dev down
        continue-on-error: true
      
      - name: Build DEV server images
        shell: powershell
        run: |
          cd "${{ env.P08_DIR }}"
          Write-Host "Building DEV server images..." -ForegroundColor Yellow
          docker-compose -f docker-compose.dev.yml --env-file .env.dev build
      
      - name: Start DEV server
        shell: powershell
        run: |
          cd "${{ env.P08_DIR }}"
          Write-Host "Starting DEV server..." -ForegroundColor Yellow
          docker-compose -f docker-compose.dev.yml --env-file .env.dev up -d
      
      - name: Wait for services
        shell: powershell
        run: Start-Sleep -Seconds 15
      
      - name: Health check
        shell: powershell
        run: |
          $maxAttempts = 30
          $attempt = 0
          while ($attempt -lt $maxAttempts) {
              try {
                  $response = Invoke-WebRequest -Uri "http://localhost:8001/health" -TimeoutSec 5
                  if ($response.StatusCode -eq 200) {
                      Write-Host "DEV API is HEALTHY on port 8001" -ForegroundColor Green
                      exit 0
                  }
              } catch {
                  $attempt++
                  if ($attempt -lt $maxAttempts) {
                      Write-Host "Attempt $attempt/$maxAttempts..." -ForegroundColor Yellow
                      Start-Sleep -Seconds 2
                  }
              }
          }
          Write-Host "DEV API health check failed" -ForegroundColor Red
          exit 1
      
      - name: Deployment success
        shell: powershell
        run: |
          Write-Host "DEV Server Deployed!" -ForegroundColor Green
          Write-Host "  API:       http://localhost:8001" -ForegroundColor White
          Write-Host "  Streamlit: http://localhost:8501" -ForegroundColor White
          Write-Host "  Database:  localhost:5433" -ForegroundColor White
