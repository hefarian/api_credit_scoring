name: Deploy to MAIN (Safe)
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
      - name: checkout LFS objects
        run: |
          git lfs pull
      - name: Backup Database
        run: docker exec main_credit_scoring_postgres pg_dump -U appuser -d appuser > backup_$(date +%s).sql
      - name: Deploy MAIN
        run: |
          cd /home/runner/work/api_credit_scoring/api_credit_scoring
          docker-compose -f docker-compose.yml build
          docker-compose -f docker-compose.yml up -d