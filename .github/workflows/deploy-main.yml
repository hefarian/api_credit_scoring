# ==========================================
# GitHub Actions Workflow - Deploy MAIN
# Runs on self-hosted runner (no IP required)
# ==========================================

name: 🔴 Deploy MAIN (Production)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'Documentation/**'
  workflow_dispatch:

jobs:
  deploy-main:
    name: Deploy MAIN Environment
    runs-on: [self-hosted, windows]
    
    steps:
      - name: Checkout main code
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Set deployment info
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "🚀 MAIN Deployment Started (PRODUCTION)" -ForegroundColor Red
          Write-Host "  Repository: ${{ github.repository }}" -ForegroundColor Cyan
          Write-Host "  Branch: ${{ github.ref_name }}" -ForegroundColor Cyan
          Write-Host "  Commit: ${{ github.sha }}" -ForegroundColor Cyan
          Write-Host "  Triggered by: ${{ github.actor }}" -ForegroundColor Cyan
          Write-Host ""
      
      - name: Stop existing containers
        shell: powershell
        run: |
          cd "${{ github.workspace }}"
          Write-Host "Stopping old containers..." -ForegroundColor Yellow
          docker-compose --env-file .env.prod down
        continue-on-error: true
      
      - name: Pull latest main code
        shell: powershell
        run: |
          cd "${{ github.workspace }}"
          Write-Host "Pulling latest code from main branch..." -ForegroundColor Yellow
          git pull origin main
      
      - name: Build Docker images
        shell: powershell
        run: |
          cd "${{ github.workspace }}"
          Write-Host "Building Docker images for MAIN..." -ForegroundColor Yellow
          docker-compose --env-file .env.prod build
      
      - name: Start MAIN environment
        shell: powershell
        run: |
          cd "${{ github.workspace }}"
          Write-Host "Starting MAIN environment..." -ForegroundColor Yellow
          docker-compose --env-file .env.prod up -d
      
      - name: Wait for services
        shell: powershell
        run: |
          Write-Host "Waiting for services to initialize..." -ForegroundColor Yellow
          Start-Sleep -Seconds 15
      
      - name: Verify services
        shell: powershell
        run: |
          cd "${{ github.workspace }}"
          Write-Host "Verifying services..." -ForegroundColor Cyan
          docker-compose --env-file .env.prod ps
      
      - name: Health check
        shell: powershell
        run: |
          Write-Host "Checking API health..." -ForegroundColor Yellow
          $maxAttempts = 30
          $attempt = 0
          
          while ($attempt -lt $maxAttempts) {
              try {
                  $response = Invoke-WebRequest -Uri "http://localhost:8000/health" -TimeoutSec 5
                  if ($response.StatusCode -eq 200) {
                      Write-Host "MAIN API is HEALTHY" -ForegroundColor Green
                      exit 0
                  }
              } catch {
                  $attempt++
                  if ($attempt -lt $maxAttempts) {
                      Write-Host "Attempt $attempt/$maxAttempts - API not ready yet..." -ForegroundColor Yellow
                      Start-Sleep -Seconds 2
                  }
              }
          }
          Write-Host "API health check failed after $maxAttempts attempts" -ForegroundColor Red
          exit 1
      
      - name: Log deployment success
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "✅ MAIN Environment Deployed Successfully!" -ForegroundColor Green
          Write-Host ""
          Write-Host "Access MAIN Environment:" -ForegroundColor Cyan
          Write-Host "  🔗 API:       http://localhost:8000" -ForegroundColor White
          Write-Host "  📊 Dashboard: http://localhost:8501" -ForegroundColor White
          Write-Host ""
