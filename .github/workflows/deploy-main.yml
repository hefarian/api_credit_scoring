# ==========================================
# GitHub Actions Workflow - MAIN Server Deploy
# Deploy to MAIN server simulation (P08)
# Ports: API 8000, Streamlit 8500, DB 5432
# ==========================================

name: 🔴 Deploy MAIN Server

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'Documentation/**'
  workflow_dispatch:

env:
  P08_DIR: g:\GITHUB\Data-Scientist-OC\P08

jobs:
  deploy-main-server:
    name: Deploy MAIN Server (8000/8500/5432)
    runs-on: [self-hosted, windows]
    
    steps:
      - name: Deployment info
        shell: powershell
        run: |
          Write-Host "MAIN Server Deployment" -ForegroundColor Red
          Write-Host "  Branch: ${{ github.ref_name }}" -ForegroundColor Cyan
          Write-Host "  Commit: ${{ github.sha }}" -ForegroundColor Cyan
          Write-Host "  By: ${{ github.actor }}" -ForegroundColor Cyan
      
      - name: Pull latest code in MAIN clone
        shell: powershell
        run: |
          cd "${{ env.P08_DIR }}\api_credit_scoring_main"
          Write-Host "Pulling latest main code into clone..." -ForegroundColor Yellow
          git reset --hard
          git pull origin main
      
      - name: Stop MAIN server containers
        shell: powershell
        run: |
          cd "${{ env.P08_DIR }}"
          Write-Host "Stopping MAIN server containers..." -ForegroundColor Yellow
          docker-compose -f docker-compose.main.yml --env-file .env.main down
        continue-on-error: true
      
      - name: Build MAIN server images
        shell: powershell
        run: |
          cd "${{ env.P08_DIR }}"
          Write-Host "Building MAIN server images..." -ForegroundColor Yellow
          docker-compose -f docker-compose.main.yml --env-file .env.main build
      
      - name: Start MAIN server
        shell: powershell
        run: |
          cd "${{ env.P08_DIR }}"
          Write-Host "Starting MAIN server..." -ForegroundColor Yellow
          docker-compose -f docker-compose.main.yml --env-file .env.main up -d
      
      - name: Wait for services
        shell: powershell
        run: Start-Sleep -Seconds 15
      
      - name: Health check
        shell: powershell
        run: |
          $maxAttempts = 30
          $attempt = 0
          while ($attempt -lt $maxAttempts) {
              try {
                  $response = Invoke-WebRequest -Uri "http://localhost:8000/health" -TimeoutSec 5
                  if ($response.StatusCode -eq 200) {
                      Write-Host "MAIN API is HEALTHY on port 8000" -ForegroundColor Green
                      exit 0
                  }
              } catch {
                  $attempt++
                  if ($attempt -lt $maxAttempts) {
                      Write-Host "Attempt $attempt/$maxAttempts..." -ForegroundColor Yellow
                      Start-Sleep -Seconds 2
                  }
              }
          }
          Write-Host "MAIN API health check failed" -ForegroundColor Red
          exit 1
      
      - name: Deployment success
        shell: powershell
        run: |
          Write-Host "MAIN Server Deployed!" -ForegroundColor Green
          Write-Host "  API:       http://localhost:8000" -ForegroundColor White
          Write-Host "  Streamlit: http://localhost:8500" -ForegroundColor White
          Write-Host "  Database:  localhost:5432" -ForegroundColor White
